<!doctype html>
<html lang="en">
	<head>
		<meta charset="utf-8" />
		<meta
			name="viewport"
			content="width=device-width, initial-scale=1.0, shrink-to-fit=no"
		/>
		<title>Settings</title>
		<link rel="icon" href="sj.png" />
		<link rel="preconnect" href="https://fonts.googleapis.com" />
		<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
		<link
			href="https://fonts.googleapis.com/css2?family=Schoolbell&family=Space+Grotesk:wght@400;500;700&display=swap"
			rel="stylesheet"
		/>
		<script src="app-data.js" defer></script>
		<link rel="stylesheet" href="proxy-history.css" />
		<script src="proxy-settings.js" defer></script>
	</head>
	<body>
		<main class="history-page">
			<header class="history-hero">
				<img class="history-logo" src="sj.png" alt="Scramjet" />
				<div class="history-copy">
					<p class="history-kicker">proxy://settings</p>
					<h1>Settings</h1>
					<p class="history-subtitle">
						Configure your Scramjet Proxy browser.
					</p>
				</div>
			</header>

			<section class="history-panel">
				<div class="history-panel-head">
					<h2>Bookmarks</h2>
				</div>
				<div style="padding: 1rem; color: rgba(255, 255, 255, 0.92);">
					<button id="reset-bookmarks-btn" type="button" style="padding: 0.75rem 1rem; border-radius: 12px; border: 1px solid rgba(255, 255, 255, 0.08); background: rgba(255, 255, 255, 0.06); color: inherit; font: inherit; cursor: pointer; transition: transform 0.15s ease, background-color 0.15s ease;" onmouseover="this.style.backgroundColor='rgba(255, 255, 255, 0.12)'; this.style.transform='translateY(-1px)';" onmouseout="this.style.backgroundColor='rgba(255, 255, 255, 0.06)'; this.style.transform='translateY(0)';">
						Reset Bookmarks
					</button>
				</div>
			</section>
		</main>
	</body>
</html>
