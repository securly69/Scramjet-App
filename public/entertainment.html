<!doctype html>
<html lang="en">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0, shrink-to-fit=no" />
		<title>Entertainment</title>
		<link rel="icon" href="sj.png" />
		<link rel="preconnect" href="https://fonts.googleapis.com" />
		<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
		<link href="https://fonts.googleapis.com/css2?family=Schoolbell&family=Space+Grotesk:wght@400;500;700&display=swap" rel="stylesheet" />
		<script src="/scram/scramjet.all.js"></script>
		<script src="/baremux/index.js"></script>
		<script src="register-sw.js" defer></script>
		<link rel="stylesheet" href="games.css" />
		<script src="entertainment.js" defer></script>
	</head>
	<body>
		<main class="games-page">
			<header class="games-hero">
				<img class="games-logo" src="sj.png" alt="Scramjet" />
				<div class="games-copy">
					<p class="games-kicker">KSF Entertainment</p>
					<h1>Directory</h1>
					<p class="games-subtitle">Select a category to start watching or listening immediately.</p>
				</div>
                <a href="/" class="back-home-btn">Back to Home</a>
			</header>

			<section class="games-panel">
				<ul class="games-grid" id="entertainment-grid">
					<!-- generated by js -->
				</ul>
			</section>
		</main>

		<div id="game-overlay" class="hidden">
			<div class="game-overlay-header">
				<button id="game-back" type="button">Home</button>
				<button id="game-reload" type="button">Reload</button>
				<span style="flex:1;"></span>
				<button id="game-close" type="button">Close</button>
			</div>
			<div id="game-frame-container"></div>
		</div>
	</body>
</html>
